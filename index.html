<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="game-container">
      <h1>Snake Game</h1>

      <div class="score-board">
        <p>Score: <span id="score">0</span></p>
      </div>

      <div class="board-wrapper">
        <div class="game-board" id="gameBoard"></div>

        <div class="start-screen" id="startScreen">
          <h2 id="title">
            Use your keyboard or the on-screen controls to move the snake
          </h2>
          <button id="startButton">Start Game</button>
        </div>
      </div>

      <div class="mobile-controls">
        <div class="controls-grid">
          <button class="control-btn up"><span>▲</span></button>
          <button class="control-btn left"><span>◀</span></button>
          <button class="control-btn down"><span>▼</span></button>
          <button class="control-btn right"><span>▶</span></button>
        </div>
      </div>
    </main>

    <script src="js/script.js" defer></script>
  </body>
</html>
